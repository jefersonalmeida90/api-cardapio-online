databaseChangeLog:
  - changeSet:
      id: 001-create-clients
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: Clients
      changes:
        - createTable:
            tableName: Clients
            columns:
              - column:
                  name: Id
                  type: uniqueidentifier
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: Name
                  type: nvarchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: Email
                  type: nvarchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: Phone
                  type: nvarchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: ZipCode
                  type: nvarchar(9)
                  constraints:
                    nullable: false
              - column:
                  name: Street
                  type: nvarchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: Number
                  type: nvarchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: Neighborhood
                  type: nvarchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: City
                  type: nvarchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: State
                  type: nvarchar(2)
                  constraints:
                    nullable: false
              - column:
                  name: Complement
                  type: nvarchar(100)
                  defaultValue: ""
                  constraints:
                    nullable: false
              - column:
                  name: PasswordHash
                  type: nvarchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: RegisteredAt
                  type: date
                  constraints:
                    nullable: false

